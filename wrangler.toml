name = "lull-site"
main = "worker.js"
compatibility_date = "2025-06-01"

[assets]
directory = "./public"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "none"
run_worker_first = true

# Already attached to this Worker. If wrangler reports the custom domain
# already exists, that's expected — leave it as-is.
[[routes]]
pattern = "lull.tinybirdbigdreams.com"
custom_domain = true

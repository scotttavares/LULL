# Codemagic CI — builds Lull (Vite + React + Capacitor 6) and uploads to App Store Connect.
# Runs entirely in the cloud; no Mac required.
#
# One-time setup in the Codemagic UI before the first run:
#   1. Add this GitHub repo as an app.
#   2. Settings -> Integrations -> Developer Portal: add your App Store Connect API key
#      ("App Manager" access). Integration name must match `app_store_connect` below.
#   3. Add a SECURE env var CERTIFICATE_PRIVATE_KEY (a PEM RSA private key) in group "appstore".
#
workflows:
  ios-release:
    name: Lull iOS release
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: "Codemagic Lull"   # must match your Codemagic integration name

    environment:
      groups:
        - appstore                          # holds CERTIFICATE_PRIVATE_KEY (secure)
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        APP_APPLE_ID: "6783862542"          # Lull's numeric Apple ID in App Store Connect
        BUNDLE_ID: "com.tinybirdbigdreams.lull"

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Build the web app (Vite)
        script: |
          npm run build

      - name: Add iOS platform (if not committed) and sync
        script: |
          [ -d "ios/App" ] || npx cap add ios
          npx cap sync ios

      - name: Generate app icon + splash from assets/
        script: |
          npx capacitor-assets generate --ios || echo "asset generation skipped"

      - name: Skip export-compliance prompt (no non-exempt encryption)
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption NO" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool NO" "$PLIST"

      - name: Set build number (auto-increment from App Store Connect)
        script: |
          LATEST=$(app-store-connect get-latest-build-number "$APP_APPLE_ID" 2>/dev/null || echo "0")
          [ -z "$LATEST" ] && LATEST=0
          NEW=$((LATEST + 1))
          echo "Setting build number to $NEW"
          cd ios/App
          agvtool new-version -all "$NEW"

      - name: Sign and build the signed IPA
        script: |
          set -e
          # Pin the app target's bundle id to match the App ID + profile
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" \
            ios/App/App.xcodeproj/project.pbxproj || true
          # Create (or reuse) the distribution cert from OUR persistent private key, + the profile
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          # Apply the profile AND archive in the same step so signing state is fresh
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --archive-flags "TARGETED_DEVICE_FAMILY=1"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false   # set true later if you want TestFlight
        submit_to_app_store: false    # we attach + submit manually in App Store Connect